<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ask Happy Thoughts</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="section">
    <div class="shell" style="max-width:840px;">
      <article class="card panel glass" style="padding:32px;">
        <div class="eyebrow">Ask Happy Thoughts</div>
        <h1 style="margin-top:16px;">Ask once. Get an answer.</h1>
        <p class="lead" style="margin-top:16px;">This is the stripped-down path: no fancy frontend bullshit, just submit and return an answer page.</p>
        <form method="POST" action="/web-ask" style="margin-top:24px;display:grid;gap:16px;">
          <div>
            <label for="prompt" class="field-label">Question</label>
            <textarea id="prompt" name="prompt" class="textarea" rows="10" placeholder="Ask anything..."></textarea>
          </div>
          <input type="hidden" name="mode" value="consensus" />
          <div>
            <button class="btn btn-primary" type="submit">Get answer</button>
          </div>
        </form>
      </article>
    </div>
  </main>
</body>
</html>
