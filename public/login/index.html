<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Login — Happy Thoughts</title>
  <meta name="description" content="Sign in to use Happy Thoughts consensus and fact-checking." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="/">
        <div class="brand-mark">✦</div>
        <div class="brand-copy">
          <span>Happy Thoughts</span>
          <small>ask once • compare fast</small>
        </div>
      </a>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/ask">Ask</a>
        <a href="/providers">Providers</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="shell" style="max-width:720px;">
      <article class="card panel glass" style="padding:32px;">
        <div class="eyebrow">Email login</div>
        <h1 style="max-width:12ch;margin-top:16px;">One login. Then just ask.</h1>
        <p class="lead" style="margin-top:18px;max-width:34ch;">Use your email to unlock the free consensus lane and keep your usage tied to a real account.</p>
        <div id="auth-status" class="notice" style="margin-top:20px;">Loading login…</div>
        <div id="auth-container" style="margin-top:22px;"></div>
      </article>
    </div>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = 'happythoughts_auth_user';
      const REDIRECT_KEY = 'happythoughts_post_auth_redirect';

      const saveUser = (user) => localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
      const getRedirect = () => localStorage.getItem(REDIRECT_KEY) || '/ask';
      const getAbsoluteRedirect = () => new URL(getRedirect(), window.location.origin).toString();
      const clearRedirect = () => localStorage.removeItem(REDIRECT_KEY);

      async function mountLogin() {
        const authStatus = document.getElementById('auth-status');
        const authContainer = document.getElementById('auth-container');
        const config = await fetch('/auth/config').then(r => r.json()).catch(() => ({ enabled: false }));

        if (!config?.enabled || !config?.clerkPublishableKey) {
          authStatus.textContent = 'Email auth is not configured on this deployment yet.';
          return;
        }

        authStatus.textContent = 'Continue with email.';
        const encoded = config.clerkPublishableKey.split('_')[2] || '';
        const clerkDomain = atob(encoded).slice(0, -1);
        const script = document.createElement('script');
        script.async = true;
        script.crossOrigin = 'anonymous';
        script.setAttribute('data-clerk-publishable-key', config.clerkPublishableKey);
        script.src = `https://${clerkDomain}/npm/@clerk/clerk-js@latest/dist/clerk.browser.js`;
        script.onload = async () => {
          const Clerk = window.Clerk;
          await Clerk.load();

          if (Clerk.user) {
            const email = Clerk.user.primaryEmailAddress?.emailAddress || '';
            saveUser({ id: Clerk.user.id, email, firstName: Clerk.user.firstName || '', lastName: Clerk.user.lastName || '' });
            const redirect = getRedirect();
            clearRedirect();
            window.location.href = redirect;
            return;
          }

          Clerk.mountSignIn(authContainer, {
            appearance: {
              variables: {
                colorPrimary: '#c026d3',
                colorBackground: '#0a0a0f',
                colorText: '#f0e6ff',
                colorInputBackground: '#151122',
                colorInputText: '#f0e6ff',
                borderRadius: '16px'
              }
            },
            signUpUrl: '/login',
            afterSignInUrl: getAbsoluteRedirect(),
            afterSignUpUrl: getAbsoluteRedirect()
          });
        };
        script.onerror = () => {
          authStatus.textContent = 'Could not load email login right now.';
        };
        document.head.appendChild(script);
      }

      mountLogin();
    })();
  </script>
</body>
</html>
