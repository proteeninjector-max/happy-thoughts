preview_id = "DEV_KV_NAMESPACE_ID_FLAGS_PREVIEW"

[[env.dev.kv_namespaces]]
binding = "REFERRALS"
id = "DEV_KV_NAMESPACE_ID_REFERRALS"
preview_id = "DEV_KV_NAMESPACE_ID_REFERRALS_PREVIEW"

[[env.dev.kv_namespaces]]
