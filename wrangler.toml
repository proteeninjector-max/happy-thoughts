name = "happythoughts"
main = "src/index.ts"
compatibility_date = "2025-03-01"
account_id = "CLOUDFLARE_ACCOUNT_ID"
workers_dev = true
routes = [
  { pattern = "happythoughts.cc", custom_domain = true },
  { pattern = "www.happythoughts.cc", custom_domain = true }
]
legacy_assets = "./public"

[vars]
# PLACEHOLDER — set in deployment environment
PROFIT_WALLET = "YOUR_PROFIT_WALLET"
X402_FACILITATOR_URL = "https://x402.org/facilitator"
X402_NETWORK = "eip155:8453"
X402_ASSET = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
CLERK_PUBLISHABLE_KEY = "pk_live_REPLACE_IN_DEPLOYMENT"

# Secrets (set via `wrangler secret put`)
# ANTHROPIC_API_KEY
# CEREBRAS_API_KEY
# MISTRAL_API_KEY
# GEMMA_AI_API_KEY
# PAYPAL_CLIENT_ID
# PAYPAL_CLIENT_SECRET
# PAYPAL_WEBHOOK_ID
# CLERK_SECRET_KEY

# Optional PayPal vars
# CLERK_PUBLISHABLE_KEY = "pk_live_..."
# PAYPAL_ENV = "sandbox" # or "live"
# PAYPAL_API_BASE = "https://api-m.sandbox.paypal.com"

# Optional vars for internal consensus routing
# CEREBRAS_MODEL = "llama3.1-8b"
# MISTRAL_MODEL = "mistral-small-latest"
# GEMMA_MODEL = "gemma-4-31b-it"
# GEMINI_SYNTHESIS_MODEL = "gemini-2.5-flash"

[[kv_namespaces]]
binding = "PROVIDERS"
id = "KV_NAMESPACE_ID_PROVIDERS"
preview_id = "KV_NAMESPACE_ID_PROVIDERS_PREVIEW"

[[kv_namespaces]]
binding = "SCORES"
id = "KV_NAMESPACE_ID_SCORES"
preview_id = "KV_NAMESPACE_ID_SCORES_PREVIEW"

[[kv_namespaces]]
binding = "THOUGHTS"
id = "KV_NAMESPACE_ID_THOUGHTS"
preview_id = "KV_NAMESPACE_ID_THOUGHTS_PREVIEW"

[[kv_namespaces]]
binding = "CACHE"
id = "KV_NAMESPACE_ID_CACHE"
preview_id = "KV_NAMESPACE_ID_CACHE_PREVIEW"

[[kv_namespaces]]
binding = "BUNDLES"
id = "KV_NAMESPACE_ID_BUNDLES"
preview_id = "KV_NAMESPACE_ID_BUNDLES_PREVIEW"

[[kv_namespaces]]
binding = "BUYERS"
id = "KV_NAMESPACE_ID_BUYERS"
preview_id = "KV_NAMESPACE_ID_BUYERS_PREVIEW"

[[kv_namespaces]]
binding = "FEEDBACK"
id = "KV_NAMESPACE_ID_FEEDBACK"
preview_id = "KV_NAMESPACE_ID_FEEDBACK_PREVIEW"

[[kv_namespaces]]
binding = "FLAGS"
id = "KV_NAMESPACE_ID_FLAGS"
preview_id = "KV_NAMESPACE_ID_FLAGS_PREVIEW"

[[kv_namespaces]]
binding = "REFERRALS"
id = "KV_NAMESPACE_ID_REFERRALS"
preview_id = "KV_NAMESPACE_ID_REFERRALS_PREVIEW"

[[kv_namespaces]]
binding = "AGREEMENTS"
id = "KV_NAMESPACE_ID_AGREEMENTS"
preview_id = "KV_NAMESPACE_ID_AGREEMENTS_PREVIEW"

[triggers]
crons = ["0 6 * * *"]

[env.dev]
name = "happythoughts-dev"
workers_dev = true

[env.dev.vars]
PROFIT_WALLET = "YOUR_PROFIT_WALLET"
X402_FACILITATOR_URL = "https://x402.org/facilitator"
X402_NETWORK = "eip155:8453"
X402_ASSET = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
CLERK_PUBLISHABLE_KEY = "CLERK_DEV_PUBLISHABLE_KEY"
MOBY_ENDPOINT_BASE = "https://moby.proteeninjector.com/moby"

[[env.dev.kv_namespaces]]
binding = "PROVIDERS"
id = "DEV_KV_NAMESPACE_ID_PROVIDERS"
preview_id = "DEV_KV_NAMESPACE_ID_PROVIDERS_PREVIEW"

[[env.dev.kv_namespaces]]
