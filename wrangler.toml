[[env.dev.kv_namespaces]]
binding = "CACHE"
id = "DEV_KV_NAMESPACE_ID_CACHE"
preview_id = "DEV_KV_NAMESPACE_ID_CACHE_PREVIEW"

[[env.dev.kv_namespaces]]
